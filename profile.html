    <script type="module">
// Firebase imports
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// Firebase config
const firebaseConfig = {
    apiKey: "AIzaSyAjx0r8OsJAEI8sdTopWadcGYcnD9jcme4",
    authDomain: "ctc-capital.firebaseapp.com",
    projectId: "ctc-capital",
    storageBucket: "ctc-capital.firebasestorage.app",
    messagingSenderId: "563837502113",
    appId: "1:563837502113:web:d84ae0e9d07c997ebb26e0",
    measurementId: "G-7L643VX04V"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// Auth Guard
onAuthStateChanged(auth, async (user) => {
    if (!user) {
        window.location.href = "../public/login.html";
    } else {
        // Fetch user data
        const userDoc = await getDoc(doc(db, "users", user.uid));
        if (userDoc.exists()) {
            const data = userDoc.data();
            document.getElementById('userName').innerText = data.fullName || 'User';
            document.getElementById('userInitials').innerText = data.fullName ? data.fullName.charAt(0).toUpperCase() : 'U';

            const kycStatusElement = document.getElementById('kycStatus');
            if (kycStatusElement) {
                const isVerified = data.kycStatus === 'verified';
                kycStatusElement.innerText = isVerified ? 'Verified' : 'Unverified';
                kycStatusElement.className = `mt-4 inline-flex rounded-full px-3 py-1 text-sm font-semibold ${isVerified ? 'bg-emerald-100 text-emerald-700' : 'bg-red-100 text-red-700'}`;
            }
        }
    }
});

function signOut() {
    auth.signOut().then(() => {
        window.location.href = "../public/login.html";
    }).catch((error) => {
        console.error("Sign out error:", error);
    });
}
    </script>
